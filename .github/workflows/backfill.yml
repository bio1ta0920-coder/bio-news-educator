name: 날짜별 백필 (과거 날짜 교육자료 생성)

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작 날짜 (YYYY-MM-DD, 예: 2026-06-01)'
        required: true
        type: string
      end_date:
        description: '종료 날짜 (YYYY-MM-DD, 예: 2026-06-06)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 날짜 범위 백필 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python - <<'EOF'
          import subprocess
          from datetime import date, timedelta

          start = date.fromisoformat("${{ github.event.inputs.start_date }}")
          end   = date.fromisoformat("${{ github.event.inputs.end_date }}")
          current = start
          while current <= end:
              d = current.isoformat()
              print(f"\n{'='*48}\n 백필 실행: {d}\n{'='*48}")
              result = subprocess.run(["python", "main.py", "--date", d, "--limit", "5"])
              if result.returncode != 0:
                  print(f"[{d}] 기사 없음 또는 오류 — 다음 날짜로 계속")
              current += timedelta(days=1)
          EOF

      - name: 생성된 파일 커밋 및 푸시
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "백필 교육자료: ${{ github.event.inputs.start_date }} ~ ${{ github.event.inputs.end_date }}"
          git pull --rebase
          git push
