name: 생명과학 뉴스 교육자료 자동 생성

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 전날
    - cron: "0 22 * * *"
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  generate-bio-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: seen_articles.json 캐시 복원
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: 문법 확인
        run: |
          git log --oneline -3
          python -m py_compile google_docs_publisher.py && echo "google_docs_publisher.py OK"
          python -m py_compile processor.py && echo "processor.py OK"
          python -m py_compile scraper.py && echo "scraper.py OK"
          python -m py_compile main.py && echo "main.py OK"

      - name: 교육자료 생성 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python main.py

      - name: seen_articles.json 캐시 저장
        uses: actions/cache@v4
        if: always()
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
