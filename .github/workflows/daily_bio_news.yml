name: 생명과학 뉴스 교육자료 자동 생성

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 전날
    - cron: "0 22 * * *"
  workflow_dispatch:  # 수동 실행도 가능

permissions:
  contents: write

jobs:
  generate-bio-news:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.12 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: seen_articles.json 캐시 복원
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: 문법 확인
        run: |
          echo "=== 현재 커밋 ==="
          git log --oneline -3
          echo "=== google_docs_publisher.py 205~215줄 ==="
          sed -n '205,215p' google_docs_publisher.py
          echo "=== triple-quote 있는 줄 ==="
          grep -n '"""' google_docs_publisher.py || echo "없음"
          echo "=== 문법 체크 ==="
          python -m py_compile google_docs_publisher.py && echo "OK"

      - name: 교육자료 생성 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python main.py

      - name: 진로·전문교과 연계 추가
        run: python add_curriculum_ci.py

      - name: 날짜별 목록 섹션명 동기화
        run: python fix_new_headline_ci.py

      - name: 생성된 파일 커밋 및 푸시
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "교육자료 자동 생성: $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          git pull --rebase
          git push

      - name: seen_articles.json 캐시 저장
        uses: actions/cache@v4
        if: always()
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
